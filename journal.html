  <style>
    :root{
      --bg: #070a12;
      --panel: rgba(255,255,255,.06);
      --panel2: rgba(255,255,255,.04);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.70);
      --line: rgba(255,255,255,.12);
      --glow: rgba(110,200,255,.18);
      --maxw: 1120px;
      --radius: 22px;
    }

    *{ box-sizing: border-box; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 50% 0%, rgba(90,140,255,.16), transparent 55%),
                  radial-gradient(900px 500px at 15% 20%, rgba(0,255,210,.10), transparent 52%),
                  var(--bg);
      color: var(--text);
    }

    a{ color: inherit; text-decoration: none; }
    a:hover{ text-decoration: underline; }

    .topbar{
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(10px);
      background: rgba(7,10,18,.65);
      border-bottom: 1px solid var(--line);
    }
    .topbar-inner{
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .brand{
      display:flex; align-items:center; gap:10px;
      letter-spacing: .08em;
      text-transform: uppercase;
      font-size: 12px;
      color: var(--muted);
    }
    .brand-dot{
      width:10px; height:10px; border-radius:50%;
      background: rgba(110,200,255,.9);
      box-shadow: 0 0 18px var(--glow);
    }
    .nav{
      display:flex; gap:14px; flex-wrap: wrap;
      font-size: 13px;
      color: var(--muted);
    }
    .nav a{
      padding: 6px 10px;
      border: 1px solid transparent;
      border-radius: 999px;
    }
    .nav a:hover{
      border-color: var(--line);
      background: rgba(255,255,255,.04);
      text-decoration: none;
    }

    .wrap{
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 28px 18px 80px;
    }

    .page-title{
      margin: 16px 0 8px;
      font-size: 28px;
      letter-spacing: .02em;
    }
    .page-sub{
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.45;
      max-width: 70ch;
    }

    /* ===== БЛОК ЖУРНАЛА ===== */
    .entry{
      position: relative;
      background: linear-gradient(180deg, var(--panel), var(--panel2));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 22px 18px;
      overflow: hidden;
    }
    .entry::before{
      content:"";
      position:absolute;
      inset:-2px;
      background: radial-gradient(600px 220px at 20% 0%, rgba(110,200,255,.16), transparent 55%),
                  radial-gradient(420px 260px at 85% 10%, rgba(120,255,220,.10), transparent 55%);
      pointer-events:none;
      opacity:.65;
    }

    .grid{
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1.2fr 1fr;
      gap: 16px;
      align-items: stretch;
    }

    .col{
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px 14px;
      background: rgba(0,0,0,.18);
      min-height: 180px;
    }

    .col h3{
      margin: 0 0 10px;
      font-size: 14px;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: rgba(255,255,255,.85);
    }

    .col p{
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 14px;
    }

    /* Средняя колонка под изображение */
    .media{
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 0;
      background: rgba(0,0,0,.10);
      border-style: dashed;
    }
    .media .ph{
      padding: 16px;
      text-align:center;
      color: rgba(255,255,255,.55);
      font-size: 13px;
      line-height: 1.5;
    }
    .media img{
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 18px;
      display: block;
    }

    /* ===== ГРАФИЧЕСКИЙ РАЗДЕЛИТЕЛЬ МЕЖДУ БЛОКАМИ ===== */
    .divider{
      height: 44px;
      margin: 18px 0;
      position: relative;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .divider::before{
      content:"";
      position:absolute;
      left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(110,200,255,.35), rgba(255,255,255,.12), rgba(120,255,220,.25), transparent);
    }
    .divider .sig{
      position: relative;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(7,10,18,.55);
      color: rgba(255,255,255,.70);
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
      box-shadow: 0 0 24px rgba(110,200,255,.12);
    }

    /* ===== АДАПТАЦИЯ ДЛЯ ТЕЛЕФОНА ===== */
    @media (max-width: 900px){
      .grid{ grid-template-columns: 1fr; }
      .col{ min-height: auto; }
      .media{ min-height: 220px; }
    }
  </style>
</head>
